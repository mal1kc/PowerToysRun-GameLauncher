name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore GameLauncher.sln

      - name: Download PowerToys release and find libs
        id: get_powertoys
        shell: pwsh
        run: |
          $api = 'https://api.github.com/repos/microsoft/PowerToys/releases/latest'
          $r = Invoke-RestMethod -Uri $api
          $asset = $r.assets | Where-Object { $_.browser_download_url -and ($_.name -match '\.zip$') } | Select-Object -First 1
          if (-not $asset) { Write-Warning 'No zip asset found'; echo "ptpath=" >> $env:GITHUB_OUTPUT; exit 0 }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile powertoys.zip
          Expand-Archive powertoys.zip -DestinationPath powertoys -Force
          $dll = Get-ChildItem -Path powertoys -Recurse -Filter 'Wox.Plugin.dll' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($dll) { $ptPath = $dll.Directory.FullName; echo "ptpath=$ptPath" >> $env:GITHUB_OUTPUT } else {
            $exe = Get-ChildItem -Path powertoys -Recurse -Filter 'PowerToys.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) { $ptPath = $exe.Directory.FullName; echo "ptpath=$ptPath" >> $env:GITHUB_OUTPUT } else { Write-Warning 'PowerToys libs not found'; echo "ptpath=" >> $env:GITHUB_OUTPUT }
          }

      - name: Build plugin (uses build.ps1)
        shell: pwsh
        run: |
          if (-not "${{ steps.get_powertoys.outputs.ptpath }}") { Write-Host 'PTPath not found; attempting default Program Files path'; $pt='"$env:ProgramW6432\PowerToys"' } else { $pt = '"' + "${{ steps.get_powertoys.outputs.ptpath }}" + '"' }
          Write-Host "Using PTPath: $pt"
          .\build.ps1 -PTPath $pt

      - name: Zip plugin output
        shell: pwsh
        run: |
          $out = Join-Path $PWD 'GameLauncher\bin\x64\Release\net9.0-windows'
          if (-Not (Test-Path $out)) { Write-Error "Output folder not found: $out"; exit 1 }
          Compress-Archive -Path "$out\*" -DestinationPath artifacts.zip -Force

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts.zip
          asset_name: GameLauncher-${{ github.ref_name }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
